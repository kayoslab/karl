name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq bats

      - name: Configure git identity
        run: |
          git config --global user.email "ci@karl.dev"
          git config --global user.name "karl-ci"
          git config --global init.defaultBranch main

      - name: Run tests
        run: bats tests/
